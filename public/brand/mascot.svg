<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Maker Lab マスコット ラボくん">
  <defs>
    <linearGradient id="body" x1="120" y1="130" x2="280" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="face" x1="140" y1="150" x2="260" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="flask" x1="185" y1="255" x2="215" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.5" cy="0.4" r="0.6">
      <stop stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </radialGradient>
  </defs>

  <!-- antenna -->
  <line x1="200" y1="118" x2="200" y2="88" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round"/>
  <circle cx="200" cy="80" r="12" fill="#38bdf8"/>
  <circle cx="200" cy="80" r="12" fill="#38bdf8" opacity="0.35">
    <animate attributeName="r" values="12;18;12" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- head shell -->
  <rect x="112" y="118" width="176" height="152" rx="46" fill="url(#body)" stroke="#7dd3fc" stroke-width="4"/>
  <!-- ears -->
  <rect x="96" y="168" width="20" height="52" rx="10" fill="#bae6fd" stroke="#7dd3fc" stroke-width="3"/>
  <rect x="284" y="168" width="20" height="52" rx="10" fill="#bae6fd" stroke="#7dd3fc" stroke-width="3"/>

  <!-- face screen -->
  <rect x="140" y="150" width="120" height="90" rx="30" fill="url(#face)"/>
  <!-- eyes -->
  <circle cx="176" cy="192" r="15" fill="url(#eye)"/>
  <circle cx="224" cy="192" r="15" fill="url(#eye)"/>
  <circle cx="180" cy="187" r="4.5" fill="#fff"/>
  <circle cx="228" cy="187" r="4.5" fill="#fff"/>
  <!-- smile -->
  <path d="M180 216 Q200 232 220 216" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- lab flask badge (the "Lab" identity) -->
  <g>
    <path d="M193 262 L193 282 L179 320 Q176 330 187 330 L213 330 Q224 330 221 320 L207 282 L207 262 Z" fill="url(#flask)" stroke="#0284c7" stroke-width="3.5" stroke-linejoin="round"/>
    <rect x="189" y="256" width="22" height="8" rx="3" fill="#0284c7"/>
    <circle cx="192" cy="312" r="3" fill="#fff" opacity="0.9"/>
    <circle cx="203" cy="320" r="2.4" fill="#fff" opacity="0.9"/>
    <circle cx="199" cy="304" r="2" fill="#fff" opacity="0.8"/>
  </g>
</svg>
